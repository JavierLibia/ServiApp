<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiApp - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .phone-container {
            width: 100%;
            max-width: 375px;
            background-color: white;
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        /* Botón de cerrar (X) azul basado en el degradado del logo */
        .btn-close-custom {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #0078D4; 
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* Contenedor del Logo Vectorial */
        .logo-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-svg {
            width: 100%;
            height: 100%;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #004A87; /* Azul oscuro del degradado */
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            font-size: 0.95rem;
            background-color: #fdfdfd;
        }

        .form-control:focus {
            border-color: #2AC8C8; /* Turquesa del logo */
            box-shadow: 0 0 0 0.2rem rgba(42, 200, 200, 0.2);
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .form-check-input:checked {
            background-color: #0078D4;
            border-color: #0078D4;
        }

        .btn-login {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background-color: #004A87;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <button class="btn-close-custom">✕</button>

        <div class="logo-container">
            <!-- LOGO VECTORIAL: SERVIR AP INTEGRADO -->
            <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                <defs>
                    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0078D4; stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#004A87; stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2AC8C8; stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1E9494; stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g transform="translate(0, 5)">
                    <!-- Cuerpo del Escudo -->
                    <path d="M60 0L15 15V50C15 80 60 110 60 110C60 110 105 80 105 50V15L60 0Z" fill="url(#shieldGrad)" />
                    <!-- Siluetas -->
                    <g opacity="0.4">
                        <circle cx="45" cy="45" r="6" fill="#BAC4CE" />
                        <circle cx="60" cy="40" r="7" fill="#BAC4CE" />
                        <circle cx="75" cy="45" r="6" fill="#BAC4CE" />
                    </g>
                    <!-- Brazo Azul -->
                    <path d="M10 55C10 55 30 40 60 55C80 65 110 50 110 50L105 65C105 65 85 75 60 65C35 55 15 65 15 65L10 55Z" fill="#003E73" />
                    <!-- Brazo Turquesa -->
                    <path d="M110 65C110 65 90 80 60 65C40 55 10 70 10 70L15 55C15 55 35 45 60 55C85 65 105 55 105 55L110 65Z" fill="url(#cyanGrad)" />
                    <!-- Flecha -->
                    <path d="M60 85V35M60 35L50 45M60 35L70 45" stroke="#2AC8C8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
                    <!-- Estrella -->
                    <path d="M100 20L103 28H111L104 33L107 41L100 36L93 41L96 33L89 28H97L100 20Z" fill="#FFB200" />
                </g>
            </svg>
        </div>

        <div class="brand-name">ServiApp</div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Ingrese su DNI</label>
                <input type="text" class="form-control" placeholder="8 dígitos" maxlength="8" required pattern="\d{8}">
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="recordar">
                <label class="form-check-label" for="recordar">Recordar</label>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Accediendo a ServiApp Sullana...");
        });
    </script>
</body>
</html>
